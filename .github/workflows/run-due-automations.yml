name: Run due automations

on:
  schedule:
    - cron: "7/5 * * * *"
  workflow_dispatch:

jobs:
  run-due-automations:
    runs-on: ubuntu-latest
    steps:
      - name: Call Zyrelo cron endpoint
        run: |
          curl --fail --show-error --silent \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.ZYRELO_APP_URL }}/api/cron/run-due"
